name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from `packageManager` in package.json.
      - uses: pnpm/action-setup@v6

      # Node 24 ships with npm 11.x, which is required for OIDC trusted
      # publishing (needs npm >= 11.5.1). Node 22 bundles npm 10.x which
      # silently ignores OIDC env vars and falls back to anonymous publish
      # (resulting in an E404 from the registry).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
