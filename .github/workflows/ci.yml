name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands — no point
# finishing an obsolete build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported (engines.node) + current LTS + latest stable.
        # Mirrors @withboundary/contract-js. Node 18 was dropped — its
        # LTS ended 2025-04-30 and several dev-only deps (vitest 4+,
        # rolldown) already use Node-20-only APIs (`node:util.styleText`).
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      # No `version:` — pnpm is pinned via `packageManager` in package.json
      # so the two sources can't disagree.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

  # Single aggregate check for branch protection. Point the required status
  # check at `ci-ok` and the matrix can evolve without touching settings.
  ci-ok:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed
        if: needs.test.result != 'success'
        run: exit 1
