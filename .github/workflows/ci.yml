name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands — no point
# finishing an obsolete build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported (engines.node) + current LTS + latest stable.
        # Matches what Sentry/Datadog SDKs test against.
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      # No `version:` — pnpm is pinned via `packageManager` in package.json
      # so the two sources can't disagree.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

  # Single aggregate check for branch protection. Point the required status
  # check at `ci-ok` and the matrix can evolve without touching settings.
  ci-ok:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed
        if: needs.test.result != 'success'
        run: exit 1
